<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferencváros Európán át · 2010–2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Minimális stílus — Gábor style.css-e majd felülírja */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif; }
    .header { padding: 12px 20px; text-align: center; }
    .header h1 { color: #007A33; font-size: 1.4rem; }
    .stats { display: flex; justify-content: center; gap: 20px; padding: 8px; }
    .stats span { color: #007A33; font-weight: bold; }
    .filters { display: flex; justify-content: center; gap: 10px; padding: 8px; }
    .filters button {
      background: #16213e; color: #e0e0e0; border: 1px solid #007A33;
      padding: 6px 16px; cursor: pointer; border-radius: 4px;
    }
    .filters button.active { background: #007A33; color: #fff; }
    #map { height: calc(100vh - 120px); width: 100%; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ferencváros Európán át · 2010–2026</h1>
  </div>
  <div class="stats">
    <div><span id="stat-matches">0</span> meccs</div>
    <div><span id="stat-countries">0</span> ország</div>
    <div><span id="stat-cities">0</span> város</div>
  </div>
  <div class="filters">
    <button class="active" data-filter="all">ÖSSZES</button>
    <button data-filter="BL">BL</button>
    <button data-filter="EL">EL</button>
    <button data-filter="ECL">ECL</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="matches.js"></script>
  <script src="map.js"></script>
</body>
</html>
